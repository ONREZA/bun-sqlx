name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bun_sqlx_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/bun_sqlx_test

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type-check library
        run: bunx tsc --noEmit

      - name: Run unit tests
        run: bun test tests

      - name: Migrate example schema
        run: bun bin/bun-sqlx.ts migrate run --root example

      - name: Prepare example
        run: bun bin/bun-sqlx.ts prepare --root example

      - name: Verify offline cache matches sources
        run: bun bin/bun-sqlx.ts prepare --check --root example

      - name: Type-check example
        run: bunx tsc -p example
